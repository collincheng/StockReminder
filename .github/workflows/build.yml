name: Build StockReminder

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Read version from project
        id: version
        run: |
          VERSION=$(sed -n 's/.*MARKETING_VERSION = \(.*\);/\1/p' StockReminder.xcodeproj/project.pbxproj | head -1 | tr -d ' ')
          BUILD=$(sed -n 's/.*CURRENT_PROJECT_VERSION = \(.*\);/\1/p' StockReminder.xcodeproj/project.pbxproj | head -1 | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "App version: $VERSION ($BUILD)"

      - name: Build
        run: |
          xcodebuild -project StockReminder.xcodeproj \
            -scheme StockReminder \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Package app into zip
        run: |
          cd build/Build/Products/Release
          zip -r -y StockReminder-v${{ steps.version.outputs.version }}.zip StockReminder.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockReminder-v${{ steps.version.outputs.version }}
          path: build/Build/Products/Release/StockReminder-v${{ steps.version.outputs.version }}.zip

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/Build/Products/Release/StockReminder-v${{ steps.version.outputs.version }}.zip
